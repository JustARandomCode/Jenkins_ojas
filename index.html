<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #ff00cc, #3333ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            margin-top: 10px;
            color: #aaa;
        }

        .buttons {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            color: white;
            background: linear-gradient(135deg, #ff00cc, #3333ff);
            transition: 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 0, 204, 0.5);
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(51, 51, 255, 0.8);
        }

        .card {
            margin-top: 40px;
            padding: 25px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 40px rgba(255, 0, 204, 0.4);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Welcome</h1>
        <p>Minimal. Sharp. Intentional.</p>

        <div class="buttons">
            <button class="btn">Explore</button>
            <button class="btn">Projects</button>
        </div>

        <div class="card">
            <h2>About</h2>
            <p>This page isn’t loud. It pulls attention instead of begging for it.</p>
        </div>
    </div>

</body>
</html>
